<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section class="container">

        <h1>Contact Me</h1>

        <form class="contact-form">

            <div class="form-group">
                <input type="text" placeholder="Kenneth Kabathi" required>
            </div>

            <div class="form-group">
                <input type="email" placeholder="kennclout@gmail.com" required>
            </div>

            <div class="form-group">
                <textarea rows="6" placeholder="Let's do it together"></textarea>
            </div>

            <button class="button primary-btn">
                Send Message
            </button>

        </form>

    </section>

</body>
</html>
